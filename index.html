<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PhoneOS">
<title>PhoneOS</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/tabler-icons.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0d0d1a;
  --surface:rgba(255,255,255,0.08);
  --surface2:rgba(255,255,255,0.14);
  --border:rgba(255,255,255,0.12);
  --text:#f0f0f5;
  --text2:rgba(240,240,245,0.55);
  --accent:#7c6fff;
  --accent2:#4ecdc4;
  --red:#ff5f57;
  --font:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;
  --mono:'SF Mono','Fira Code','Courier New',monospace;
}
html,body{width:100%;height:100%;overflow:hidden;font-family:var(--font);background:var(--bg);color:var(--text);}

/* ── Wallpaper ── */
#wp{position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 70% 50% at 15% 10%,rgba(124,111,255,.4) 0%,transparent 65%),
    radial-gradient(ellipse 60% 60% at 90% 85%,rgba(78,205,196,.3) 0%,transparent 65%),
    radial-gradient(ellipse 50% 40% at 60% 40%,rgba(252,60,68,.15) 0%,transparent 60%),
    #0d0d1a;}

/* ── Status bar ── */
#status{position:fixed;top:0;left:0;right:0;z-index:200;
  height:44px;display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;
  background:rgba(13,13,26,0.5);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);}
#status-time{font-size:15px;font-weight:600;color:var(--text);}
#status-icons{display:flex;align-items:center;gap:6px;font-size:14px;color:var(--text);}

/* ── Home screen ── */
#home{position:fixed;inset:0;z-index:1;padding:54px 0 160px;overflow:hidden;}
#app-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:24px 12px;padding:24px 16px;}
.app-icon{display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;}
.icon-shell{width:68px;height:68px;border-radius:18px;
  display:flex;align-items:center;justify-content:center;font-size:30px;
  border:0.5px solid rgba(255,255,255,0.1);
  transition:transform .12s ease,opacity .12s;}
.app-icon:active .icon-shell{transform:scale(0.85);opacity:0.75;}
.icon-label{font-size:12px;color:#fff;text-align:center;font-weight:500;
  text-shadow:0 1px 4px rgba(0,0,0,.8);letter-spacing:.01em;}

/* ── Dock ── */
#dock{position:fixed;bottom:0;left:0;right:0;z-index:200;
  padding:12px 20px 28px;
  background:rgba(13,13,26,0.65);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-top:0.5px solid var(--border);}
#dock-inner{display:flex;justify-content:space-around;align-items:center;}
.dock-icon{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;}
.dock-shell{width:56px;height:56px;border-radius:16px;
  display:flex;align-items:center;justify-content:center;font-size:26px;
  border:0.5px solid rgba(255,255,255,0.1);}
.dock-icon:active .dock-shell{transform:scale(0.85);opacity:0.75;}
.dock-label{font-size:10px;color:rgba(255,255,255,.7);font-weight:500;}

/* ── Full-screen App ── */
#app-screen{position:fixed;inset:0;z-index:300;display:none;flex-direction:column;
  background:var(--bg);transform:translateY(100%);transition:transform .32s cubic-bezier(.4,0,.2,1);}
#app-screen.open{display:flex;transform:translateY(0);}
#app-header{height:56px;display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0;
  background:rgba(13,13,26,0.8);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-bottom:0.5px solid var(--border);}
#back-btn{width:36px;height:36px;border-radius:50%;background:var(--surface);
  border:0.5px solid var(--border);display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:18px;color:var(--text);flex-shrink:0;}
#back-btn:active{background:var(--surface2);}
#app-title{font-size:16px;font-weight:600;flex:1;}
#app-content{flex:1;overflow:hidden;display:flex;flex-direction:column;}

/* ── Browser ── */
#browser-bar{display:flex;align-items:center;gap:8px;padding:10px 14px;
  background:rgba(13,13,26,0.7);border-bottom:0.5px solid var(--border);flex-shrink:0;}
#browser-url{flex:1;background:var(--surface);border:0.5px solid var(--border);
  border-radius:10px;padding:9px 14px;color:var(--text);font-size:14px;
  outline:none;font-family:var(--font);}
#browser-url:focus{border-color:var(--accent);}
#go-btn{background:var(--accent);border:none;color:#fff;border-radius:10px;
  padding:9px 16px;font-size:14px;cursor:pointer;font-family:var(--font);white-space:nowrap;}
.bookmarks{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:14px;}
.bm{display:flex;flex-direction:column;align-items:center;gap:6px;
  padding:14px 8px;background:var(--surface);border:0.5px solid var(--border);
  border-radius:14px;cursor:pointer;text-decoration:none;}
.bm:active{background:var(--surface2);}
.bm i{font-size:24px;color:var(--accent);}
.bm span{font-size:11px;color:var(--text2);text-align:center;}
#browser-open-btn{margin:0 14px;padding:14px;background:var(--accent);border:none;
  color:#fff;border-radius:12px;font-size:15px;font-family:var(--font);
  cursor:pointer;width:calc(100% - 28px);}
#browser-open-btn:active{opacity:.8;}
#browser-note{padding:0 14px 14px;font-size:12px;color:var(--text2);text-align:center;line-height:1.5;}

/* ── Files ── */
.files-wrap{overflow-y:auto;flex:1;padding:8px;}
.section-label{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.07em;padding:10px 14px 4px;}
.file-row{display:flex;align-items:center;gap:12px;padding:13px 14px;
  border-radius:12px;cursor:pointer;}
.file-row:active{background:var(--surface);}
.file-icon{width:40px;height:40px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.file-info{flex:1;min-width:0;}
.file-name{font-size:14px;color:var(--text);font-weight:500;}
.file-meta{font-size:11px;color:var(--text2);margin-top:1px;}
.file-arrow{font-size:16px;color:var(--text2);}

/* ── Terminal ── */
.term-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;background:#0a0a10;}
.term-out{flex:1;overflow-y:auto;padding:14px;font-family:var(--mono);font-size:13px;color:#00ff88;line-height:1.7;}
.term-line{word-break:break-all;}
.term-cmd-color{color:var(--accent);}
.term-err{color:var(--red);}
.term-bar{display:flex;align-items:center;padding:10px 14px;gap:8px;
  background:#111118;border-top:0.5px solid var(--border);}
.term-bar span{color:#00ff88;font-family:var(--mono);font-size:13px;white-space:nowrap;}
#term-inp{flex:1;background:transparent;border:none;color:#00ff88;
  font-family:var(--mono);font-size:13px;outline:none;caret-color:#00ff88;}

/* ── Notes ── */
.notes-wrap{flex:1;display:flex;flex-direction:column;padding:14px;gap:10px;}
#note-title{background:transparent;border:none;color:var(--text);
  font-size:20px;font-weight:700;font-family:var(--font);outline:none;
  border-bottom:0.5px solid var(--border);padding-bottom:10px;}
#note-title::placeholder{color:var(--text2);}
#note-body{flex:1;background:transparent;border:none;color:var(--text);
  font-size:15px;font-family:var(--font);resize:none;outline:none;line-height:1.8;}
#note-body::placeholder{color:var(--text2);}

/* ── Calculator ── */
.calc-wrap{flex:1;display:flex;flex-direction:column;padding:16px;gap:12px;}
#calc-disp{background:var(--surface);border-radius:14px;padding:16px 20px;
  font-size:36px;font-weight:300;color:var(--text);text-align:right;
  min-height:72px;word-break:break-all;letter-spacing:-1px;}
#calc-btns{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;flex:1;}
.cb{border-radius:14px;border:none;font-size:20px;font-weight:400;
  cursor:pointer;font-family:var(--font);color:var(--text);
  background:var(--surface);min-height:64px;
  display:flex;align-items:center;justify-content:center;}
.cb:active{opacity:.6;}
.cb.op{background:var(--accent);color:#fff;}
.cb.fn{background:var(--surface2);}
.cb.eq{background:var(--accent2);color:#0d0d1a;}
.cb.zero{grid-column:span 2;border-radius:32px;justify-content:flex-start;padding-left:24px;}

/* ── Settings ── */
.settings-wrap{overflow-y:auto;flex:1;padding:10px 0 30px;}
.s-section{margin-bottom:24px;}
.s-section-title{font-size:12px;color:var(--text2);text-transform:uppercase;
  letter-spacing:.08em;padding:0 16px 6px;}
.s-row{display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px;background:var(--surface);margin-bottom:1px;}
.s-row:first-of-type{border-radius:14px 14px 0 0;}
.s-row:last-of-type{border-radius:0 0 14px 14px;margin-bottom:0;}
.s-row:only-of-type{border-radius:14px;}
.s-left{display:flex;align-items:center;gap:12px;}
.s-ic{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px;}
.s-label{font-size:15px;color:var(--text);}
.sw{width:48px;height:28px;border-radius:14px;background:var(--border);
  position:relative;cursor:pointer;transition:background .2s;flex-shrink:0;}
.sw.on{background:#34c759;}
.sw-k{width:24px;height:24px;border-radius:50%;background:#fff;
  position:absolute;top:2px;left:2px;transition:left .2s;
  box-shadow:0 1px 4px rgba(0,0,0,.4);}
.sw.on .sw-k{left:22px;}

/* ── Music ── */
.music-wrap{flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:space-around;padding:24px 24px 32px;}
.music-art{width:180px;height:180px;border-radius:20px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:72px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));}
.music-info{text-align:center;}
.music-title{font-size:22px;font-weight:700;margin-bottom:4px;}
.music-artist{font-size:15px;color:var(--text2);}
.prog-wrap{width:100%;}
.prog-bar{width:100%;height:5px;background:var(--surface2);border-radius:3px;cursor:pointer;}
.prog-fill{height:100%;border-radius:3px;background:var(--accent);width:35%;transition:width .5s linear;}
.prog-times{display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-top:6px;}
.music-ctrls{display:flex;align-items:center;gap:32px;}
.mc{background:none;border:none;color:var(--text);font-size:28px;cursor:pointer;padding:8px;}
.mc.play{font-size:56px;color:var(--accent);}
.mc:active{opacity:.6;}
.vol-row{display:flex;align-items:center;gap:10px;width:100%;}
.vol-row i{font-size:18px;color:var(--text2);}
.vol-row input{flex:1;accent-color:var(--accent);height:4px;}

/* ── Gallery ── */
.gallery-wrap{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;overflow-y:auto;flex:1;}
.gal-item{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:36px;cursor:pointer;}
.gal-item:active{opacity:.7;}

/* ── Notification ── */
#notifs{position:fixed;top:54px;left:12px;right:12px;z-index:500;display:flex;flex-direction:column;gap:8px;pointer-events:none;}
.notif{background:rgba(26,26,46,.95);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:0.5px solid var(--border);border-radius:16px;padding:14px 16px;pointer-events:auto;
  animation:nIn .3s ease;}
.notif-title{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:2px;}
.notif-msg{font-size:14px;color:var(--text);}
@keyframes nIn{from{transform:translateY(-20px);opacity:0;}to{transform:translateY(0);opacity:1;}}
@keyframes nOut{to{transform:translateY(-20px);opacity:0;}}
</style>
</head>
<body>
<div id="wp"></div>

<!-- Status Bar -->
<div id="status">
  <div id="status-time">9:41</div>
  <div id="status-icons">
    <i class="ti ti-wifi"></i>
    <i class="ti ti-signal-4g"></i>
    <i class="ti ti-battery-3"></i>
  </div>
</div>

<!-- Home -->
<div id="home">
  <div id="app-grid"></div>
</div>

<!-- Dock -->
<div id="dock">
  <div id="dock-inner"></div>
</div>

<!-- Full-screen App -->
<div id="app-screen">
  <div id="app-header">
    <div id="back-btn" onclick="goHome()"><i class="ti ti-chevron-left"></i></div>
    <div id="app-title"></div>
    <div style="width:36px"></div>
  </div>
  <div id="app-content"></div>
</div>

<!-- Notifications -->
<div id="notifs"></div>

<script>
const APPS = [
  {id:'browser', label:'Browser',    icon:'ti-world',      color:'linear-gradient(135deg,#0070c9,#34aadc)'},
  {id:'files',   label:'Files',      icon:'ti-folder',     color:'linear-gradient(135deg,#1D9E75,#4ecdc4)'},
  {id:'notes',   label:'Notes',      icon:'ti-notes',      color:'linear-gradient(135deg,#f5a623,#f8c874)'},
  {id:'music',   label:'Music',      icon:'ti-music',      color:'linear-gradient(135deg,#fc3c44,#ff8c69)'},
  {id:'calc',    label:'Calculator', icon:'ti-calculator', color:'#111'},
  {id:'gallery', label:'Gallery',    icon:'ti-photo',      color:'linear-gradient(135deg,#a29bfe,#fd79a8)'},
  {id:'terminal',label:'Terminal',   icon:'ti-terminal-2', color:'#111'},
  {id:'settings',label:'Settings',   icon:'ti-settings',   color:'linear-gradient(135deg,#636e72,#b2bec3)'},
];
const DOCK = ['browser','files','notes','settings'];

// Clock
function tick(){
  const n=new Date();
  document.getElementById('status-time').textContent=n.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
}
tick();setInterval(tick,1000);

// Build icons
const grid=document.getElementById('app-grid');
APPS.forEach(a=>{
  const el=document.createElement('div');
  el.className='app-icon';
  el.innerHTML=`<div class="icon-shell" style="background:${a.color}"><i class="ti ${a.icon}" style="color:#fff"></i></div><span class="icon-label">${a.label}</span>`;
  el.addEventListener('click',()=>openApp(a.id));
  grid.appendChild(el);
});

// Dock
const dockEl=document.getElementById('dock-inner');
DOCK.forEach(id=>{
  const a=APPS.find(x=>x.id===id);
  const el=document.createElement('div');
  el.className='dock-icon';
  el.innerHTML=`<div class="dock-shell" style="background:${a.color}"><i class="ti ${a.icon}" style="color:#fff"></i></div><span class="dock-label">${a.label}</span>`;
  el.addEventListener('click',()=>openApp(id));
  dockEl.appendChild(el);
});

// Open / close app
const screen=document.getElementById('app-screen');
function openApp(id){
  const a=APPS.find(x=>x.id===id);
  document.getElementById('app-title').textContent=a.label;
  document.getElementById('app-content').innerHTML=buildApp(id);
  screen.style.display='flex';
  requestAnimationFrame(()=>screen.classList.add('open'));
  if(id==='terminal')initTerm();
  if(id==='calc')initCalc();
  if(id==='music')initMusic();
}
function goHome(){
  screen.classList.remove('open');
  setTimeout(()=>{screen.style.display='none';document.getElementById('app-content').innerHTML='';},320);
}

// Swipe down to go home
let touchStartY=0;
screen.addEventListener('touchstart',e=>touchStartY=e.touches[0].clientY,{passive:true});
screen.addEventListener('touchend',e=>{
  const dy=e.changedTouches[0].clientY-touchStartY;
  if(dy>80)goHome();
},{passive:true});

// ── App builders ──
function buildApp(id){
  if(id==='browser') return `
    <div id="browser-bar">
      <input id="browser-url" placeholder="Search or enter URL..." onkeydown="if(event.key==='Enter')bGo()">
      <button id="go-btn" onclick="bGo()">Go</button>
    </div>
    <div class="bookmarks">
      ${[['ti-brand-google','Google','https://google.com'],['ti-brand-youtube','YouTube','https://youtube.com'],
         ['ti-world','Wikipedia','https://wikipedia.org'],['ti-brand-reddit','Reddit','https://reddit.com'],
         ['ti-news','News','https://news.ycombinator.com'],['ti-brand-github','GitHub','https://github.com']
        ].map(([ic,n,u])=>`<a class="bm" href="${u}" target="_blank"><i class="ti ${ic}"></i><span>${n}</span></a>`).join('')}
    </div>
    <button id="browser-open-btn" onclick="bOpenTab()">Open in Safari <i class="ti ti-external-link"></i></button>
    <p id="browser-note">Most websites block embedding. Tap a bookmark or enter a URL and hit "Open in Safari" to browse for real.</p>
  `;
  if(id==='files') return `
    <div class="files-wrap">
      <div class="section-label">Folders</div>
      ${[['Documents','ti-folder-filled','#4ecdc4','12 items'],['Downloads','ti-folder-filled','#7c6fff','8 items'],
         ['Photos','ti-folder-filled','#fc3c44','247 items'],['Music','ti-folder-filled','#f5a623','34 items'],
         ['Videos','ti-folder-filled','#a29bfe','6 items']].map(([n,ic,c,m])=>`
        <div class="file-row">
          <div class="file-icon" style="background:${c}20"><i class="ti ${ic}" style="color:${c}"></i></div>
          <div class="file-info"><div class="file-name">${n}</div><div class="file-meta">${m}</div></div>
          <i class="ti ti-chevron-right file-arrow"></i>
        </div>`).join('')}
      <div class="section-label">Recent Files</div>
      ${[['notes.txt','ti-file-text','#4ecdc4','2 KB','Today'],['resume.pdf','ti-file-type-pdf','#fc3c44','148 KB','Yesterday'],
         ['photo.jpg','ti-photo','#a29bfe','3.4 MB','Yesterday'],['music.mp3','ti-music','#f5a623','4.1 MB','Mon'],
         ['data.csv','ti-table','#7c6fff','12 KB','Sun']].map(([n,ic,c,s,d])=>`
        <div class="file-row">
          <div class="file-icon" style="background:${c}20"><i class="ti ${ic}" style="color:${c}"></i></div>
          <div class="file-info"><div class="file-name">${n}</div><div class="file-meta">${s} · ${d}</div></div>
          <i class="ti ti-chevron-right file-arrow"></i>
        </div>`).join('')}
    </div>`;
  if(id==='notes') return `
    <div class="notes-wrap">
      <input id="note-title" placeholder="Title..." value="My Notes">
      <textarea id="note-body" placeholder="Start writing..."></textarea>
    </div>`;
  if(id==='calc') return `
    <div class="calc-wrap">
      <div id="calc-disp">0</div>
      <div id="calc-btns"></div>
    </div>`;
  if(id==='settings') return `
    <div class="settings-wrap">
      <div class="s-section">
        <div class="s-section-title">Connectivity</div>
        ${[['Wi-Fi','ti-wifi','#0070c9',true],['Bluetooth','ti-bluetooth','#0070c9',true],['Airplane Mode','ti-plane','#636e72',false]]
          .map(([l,ic,c,on])=>`
          <div class="s-row">
            <div class="s-left"><div class="s-ic" style="background:${c}20"><i class="ti ${ic}" style="color:${c}"></i></div><span class="s-label">${l}</span></div>
            <div class="sw${on?' on':''}" onclick="this.classList.toggle('on')"><div class="sw-k"></div></div>
          </div>`).join('')}
      </div>
      <div class="s-section">
        <div class="s-section-title">Display</div>
        ${[['Dark Mode','ti-moon','#5c5470',true],['Notifications','ti-bell','#ff9f0a',true],['Auto Brightness','ti-brightness','#f5a623',false]]
          .map(([l,ic,c,on])=>`
          <div class="s-row">
            <div class="s-left"><div class="s-ic" style="background:${c}20"><i class="ti ${ic}" style="color:${c}"></i></div><span class="s-label">${l}</span></div>
            <div class="sw${on?' on':''}" onclick="this.classList.toggle('on')"><div class="sw-k"></div></div>
          </div>`).join('')}
      </div>
      <div class="s-section">
        <div class="s-section-title">About</div>
        <div class="s-row"><div class="s-left"><span class="s-label">Device</span></div><span style="color:var(--text2);font-size:14px">iPhone 7</span></div>
        <div class="s-row"><div class="s-left"><span class="s-label">OS Version</span></div><span style="color:var(--text2);font-size:14px">PhoneOS 2.0</span></div>
        <div class="s-row"><div class="s-left"><span class="s-label">Storage</span></div><span style="color:var(--text2);font-size:14px">32 GB</span></div>
      </div>
    </div>`;
  if(id==='music') return `
    <div class="music-wrap">
      <div class="music-art"><i class="ti ti-music" style="color:#fff"></i></div>
      <div class="music-info">
        <div class="music-title" id="m-title">Midnight Drive</div>
        <div class="music-artist" id="m-artist">Synthwave Radio</div>
      </div>
      <div class="prog-wrap">
        <div class="prog-bar"><div class="prog-fill" id="m-fill"></div></div>
        <div class="prog-times"><span id="m-cur">1:12</span><span id="m-tot">3:24</span></div>
      </div>
      <div class="music-ctrls">
        <button class="mc" onclick="prevTrk()"><i class="ti ti-player-skip-back-filled"></i></button>
        <button class="mc play" id="m-play" onclick="togglePlay()"><i class="ti ti-player-play-filled"></i></button>
        <button class="mc" onclick="nextTrk()"><i class="ti ti-player-skip-forward-filled"></i></button>
      </div>
      <div class="vol-row">
        <i class="ti ti-volume"></i>
        <input type="range" min="0" max="100" value="70">
        <i class="ti ti-volume-2"></i>
      </div>
    </div>`;
  if(id==='gallery') return `
    <div class="gallery-wrap">
      ${Array.from({length:18},(_,i)=>{
        const colors=['#7c6fff','#4ecdc4','#fc3c44','#f5a623','#28c840','#0070c9','#a29bfe','#fd79a8','#636e72','#00cec9','#e17055','#6c5ce7','#fdcb6e','#55efc4','#ff7675','#74b9ff','#fab1a0','#81ecec'];
        const icons=['ti-mountain','ti-beach','ti-building','ti-tree','ti-car','ti-camera','ti-heart','ti-star','ti-flame','ti-cloud','ti-sun','ti-moon','ti-fish','ti-paw','ti-flower','ti-snowflake','ti-rocket','ti-diamond'];
        return `<div class="gal-item" style="background:${colors[i]}22"><i class="ti ${icons[i]}" style="color:${colors[i]}"></i></div>`;
      }).join('')}
    </div>`;
  if(id==='terminal') return `
    <div class="term-wrap">
      <div class="term-out" id="term-out">
        <div class="term-line" style="color:var(--accent)">PhoneOS Terminal v2.0</div>
        <div class="term-line" style="color:var(--text2)">Type <span style="color:var(--accent2)">help</span> for commands.</div>
      </div>
      <div class="term-bar">
        <span>$ </span>
        <input id="term-inp" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" placeholder="type here...">
      </div>
    </div>`;
  return '<div style="padding:20px;color:var(--text2)">Coming soon</div>';
}

// Browser
function bGo(){
  const u=document.getElementById('browser-url').value.trim();
  if(u) window.open(u.startsWith('http')?u:'https://'+u,'_blank');
}
function bOpenTab(){
  const u=document.getElementById('browser-url').value.trim();
  window.open(u&&(u.startsWith('http')?u:'https://'+u)||'https://google.com','_blank');
}

// Terminal
const FS={'/':['Documents','Downloads','Photos','Music'],'/Documents':['resume.pdf','notes.txt'],'/Downloads':['photo.jpg','setup.dmg']};
let cwd='/',hist=[],hIdx=-1;
function initTerm(){
  const inp=document.getElementById('term-inp');
  if(!inp)return;
  inp.addEventListener('keydown',e=>{
    if(e.key==='Enter'){runCmd(inp.value.trim());inp.value='';hIdx=-1;}
    else if(e.key==='ArrowUp'){if(hIdx<hist.length-1){hIdx++;inp.value=hist[hIdx];}}
    else if(e.key==='ArrowDown'){if(hIdx>0){hIdx--;inp.value=hist[hIdx];}else{hIdx=-1;inp.value='';}}
  });
  inp.focus();
}
function runCmd(raw){
  if(!raw)return;
  hist.unshift(raw);
  const out=document.getElementById('term-out');
  if(!out)return;
  const[cmd,...args]=raw.split(' ');
  let res='';
  const cmds={
    help:()=>`<span style="color:var(--accent)">Commands:</span> ls, cd, pwd, echo, date, whoami, clear, neofetch, mkdir, touch, rm`,
    ls:()=>(FS[cwd]||[]).join('  ')||'(empty)',
    pwd:()=>cwd,
    date:()=>new Date().toString(),
    whoami:()=>'iphone-user',
    neofetch:()=>`<span style="color:var(--accent)">OS:</span> PhoneOS 2.0\n<span style="color:var(--accent)">Device:</span> iPhone 7\n<span style="color:var(--accent)">CPU:</span> Apple A10 Fusion\n<span style="color:var(--accent)">Shell:</span> PhoneSH\n<span style="color:var(--accent)">Resolution:</span> 750×1334`,
  };
  if(cmd==='clear'){out.innerHTML='';return;}
  else if(cmd==='echo')res=args.join(' ');
  else if(cmd==='cd'){const t=args[0];if(!t||t==='~'){cwd='/';}else if(t==='..'){cwd=cwd.split('/').slice(0,-1).join('/')||'/';}else{const p=cwd==='/'?'/'+t:cwd+'/'+t;if(FS[p])cwd=p;else res=`<span class="term-err">cd: ${t}: not found</span>`;}}
  else if(cmd==='mkdir'&&args[0]){const p=cwd==='/'?'/'+args[0]:cwd+'/'+args[0];FS[cwd]=FS[cwd]||[];FS[cwd].push(args[0]);FS[p]=[];}
  else if(cmd==='touch'&&args[0]){FS[cwd]=FS[cwd]||[];FS[cwd].push(args[0]);}
  else if(cmd==='rm'&&args[0]){FS[cwd]=(FS[cwd]||[]).filter(f=>f!==args[0]);}
  else if(cmds[cmd])res=cmds[cmd]();
  else res=`<span class="term-err">${cmd}: command not found</span>`;
  const line=document.createElement('div');
  line.className='term-line';
  line.innerHTML=`<span class="term-cmd-color">$ ${raw}</span>${res?'\n'+res:''}`;
  out.appendChild(line);
  out.scrollTop=out.scrollHeight;
}

// Calc
function initCalc(){
  const grid=document.getElementById('calc-btns');if(!grid)return;
  const disp=document.getElementById('calc-disp');
  let expr='',evaled=false;
  const layout=[[{l:'C',c:'fn'},{l:'±',c:'fn'},{l:'%',c:'fn'},{l:'÷',c:'op'}],
    [{l:'7'},{l:'8'},{l:'9'},{l:'×',c:'op'}],[{l:'4'},{l:'5'},{l:'6'},{l:'−',c:'op'}],
    [{l:'1'},{l:'2'},{l:'3'},{l:'+',c:'op'}],[{l:'0',c:'zero'},{l:'.'},{l:'=',c:'eq'}]];
  layout.forEach(row=>row.forEach(({l,c=''})=>{
    const b=document.createElement('button');
    b.className='cb '+c;b.textContent=l;
    b.addEventListener('click',()=>{
      if(l==='C'){expr='';disp.textContent='0';}
      else if(l==='='){try{const r=Function('"use strict";return('+expr.replace(/÷/g,'/').replace(/×/g,'*').replace(/−/g,'-')+')')();expr=String(r);disp.textContent=+r.toFixed(10);}catch{disp.textContent='Err';expr='';}evaled=true;}
      else if(l==='±'){const n=-parseFloat(expr||'0');expr=String(n);disp.textContent=n;}
      else if(l==='%'){const n=parseFloat(expr||'0')/100;expr=String(n);disp.textContent=n;}
      else{if(evaled&&!'÷×−+'.includes(l)){expr='';}evaled=false;expr+=l;disp.textContent=expr;}
    });
    grid.appendChild(b);
  }));
}

// Music
let playing=false,pInt=null,pSec=72,totSec=204;
const tracks=[['Midnight Drive','Synthwave Radio'],['Neon Lights','Electric Dreams'],['Cyberpunk City','Digital Pulse']];
let tIdx=0;
function initMusic(){}
function togglePlay(){
  playing=!playing;
  const btn=document.getElementById('m-play');
  if(btn)btn.innerHTML=`<i class="ti ti-player-${playing?'pause':'play'}-filled"></i>`;
  if(playing)pInt=setInterval(()=>{pSec=(pSec+1)%totSec;updProg();},1000);
  else clearInterval(pInt);
}
function updProg(){
  const f=document.getElementById('m-fill'),c=document.getElementById('m-cur');
  if(f)f.style.width=(pSec/totSec*100)+'%';
  if(c)c.textContent=Math.floor(pSec/60)+':'+String(pSec%60).padStart(2,'0');
}
function prevTrk(){tIdx=(tIdx-1+tracks.length)%tracks.length;setTrk();}
function nextTrk(){tIdx=(tIdx+1)%tracks.length;setTrk();}
function setTrk(){
  const[t,a]=tracks[tIdx];
  const tt=document.getElementById('m-title'),ta=document.getElementById('m-artist');
  if(tt)tt.textContent=t;if(ta)ta.textContent=a;pSec=0;updProg();
}

// Notifications
function notify(msg,title='PhoneOS'){
  const c=document.getElementById('notifs');
  const n=document.createElement('div');n.className='notif';
  n.innerHTML=`<div class="notif-title">${title}</div><div class="notif-msg">${msg}</div>`;
  c.appendChild(n);
  setTimeout(()=>{n.style.animation='nOut .3s ease forwards';setTimeout(()=>n.remove(),300);},3000);
}
setTimeout(()=>notify('Welcome to PhoneOS 2.0! 👋'),800);
</script>
